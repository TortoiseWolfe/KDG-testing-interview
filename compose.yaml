services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: ./server
      target: dev
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      - DOTNET_WATCH_SUPPRESS_MSBUILD_INCREMENTALISM=1
    volumes:
      - ./server:/app
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  api-tests:
    build:
      context: ./server
      target: test
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - test

  client:
    build:
      context: ./client
      target: dev
    ports:
      - "3000:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - api
    develop:
      watch:
        - action: rebuild
          path: package.json
        - action: sync
          path: ./src
          target: /app/src
    restart: unless-stopped

  client-tests:
    build:
      context: ./client
      target: test
    profiles:
      - test

volumes:
  pgdata:
